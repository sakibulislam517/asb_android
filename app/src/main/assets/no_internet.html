<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Internet Connection</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f1f1f1;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Container */
        .container {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.6s ease-in-out;
        }

        /* Heading */
        h1 {
            font-size: 2.8rem;
            color: #e74c3c;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Message */
        p {
            font-size: 1.2rem;
            color: #777;
            margin-bottom: 30px;
        }

        /* Icon */
        .icon {
            font-size: 5rem;
            color: #e74c3c;
            margin-bottom: 20px;
            animation: bounce 1.5s infinite;
        }

        /* Button */
        .retry-button {
            background-color: #3498db;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }

        .retry-button:hover {
            background-color: #2980b9;
        }

        /* Keyframes for animations */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Icon -->
    <div class="icon">📡</div>

    <!-- Heading -->
    <h1>No Internet Connection</h1>

    <!-- Message -->
    <p>Oops! It seems you're offline. Please check your internet connection and try again.</p>

    <!-- Retry Button -->
    <a class="retry-button" href="https://asbsoft.app/dashboard">Retry</a>
</div>

</body>
</html>
